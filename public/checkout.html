<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - IBD Teal Jewelry</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">IBD Teal Jewelry</a>
            <div class="nav-links">
                <a href="/">Shop</a>
                <a href="/cart.html" class="cart-link">Cart (<span id="cart-count">0</span>)</a>
                <div id="auth-links">
                    <a href="/login.html">Login</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container">
        <h1>Checkout</h1>

        <div class="checkout-layout">
            <!-- Checkout Form -->
            <div class="checkout-form">
                <h2>Billing Details</h2>
                <form id="checkout-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="bill_fname">First Name *</label>
                            <input type="text" id="bill_fname" name="bill_fname" required />
                        </div>
                        <div class="form-group">
                            <label for="bill_lname">Last Name *</label>
                            <input type="text" id="bill_lname" name="bill_lname" required />
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="bill_address1">Address *</label>
                        <input type="text" id="bill_address1" name="bill_address1" required />
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="bill_country_code">Country Code *</label>
                            <input type="text" id="bill_country_code" name="bill_country_code" placeholder="IN" required />
                        </div>
                        <div class="form-group">
                            <label for="bill_pincode">Pin Code *</label>
                            <input type="text" id="bill_pincode" name="bill_pincode" required />
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="bill_phone">Phone *</label>
                            <input type="tel" id="bill_phone" name="bill_phone" required />
                        </div>
                        <div class="form-group">
                            <label for="bill_email">Email *</label>
                            <input type="email" id="bill_email" name="bill_email" required />
                        </div>
                    </div>

                    <div class="form-group checkbox-group">
                        <label>
                            <input type="checkbox" id="same-as-billing" checked />
                            Shipping address same as billing
                        </label>
                    </div>

                    <div id="shipping-section" style="display:none;">
                        <h2>Shipping Details</h2>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="ship_fname">First Name *</label>
                                <input type="text" id="ship_fname" name="ship_fname" />
                            </div>
                            <div class="form-group">
                                <label for="ship_lname">Last Name *</label>
                                <input type="text" id="ship_lname" name="ship_lname" />
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="ship_address1">Address *</label>
                            <input type="text" id="ship_address1" name="ship_address1" />
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="ship_country_code">Country Code *</label>
                                <input type="text" id="ship_country_code" name="ship_country_code" />
                            </div>
                            <div class="form-group">
                                <label for="ship_pincode">Pin Code *</label>
                                <input type="text" id="ship_pincode" name="ship_pincode" />
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="ship_phone">Phone *</label>
                                <input type="tel" id="ship_phone" name="ship_phone" />
                            </div>
                            <div class="form-group">
                                <label for="ship_email">Email *</label>
                                <input type="email" id="ship_email" name="ship_email" />
                            </div>
                        </div>
                    </div>

                    <div id="checkout-error" class="error-message" style="display:none;"></div>
                    <button type="submit" class="btn btn-primary btn-lg btn-block" id="place-order-btn">Place Order</button>
                </form>
            </div>

            <!-- Order Summary -->
            <div class="checkout-summary">
                <h2>Order Summary</h2>
                <div id="summary-items"></div>
                <div class="summary-totals">
                    <div class="summary-row"><span>Subtotal</span><span id="summary-subtotal">₹0</span></div>
                    <div class="summary-row"><span>Taxes (18% GST)</span><span id="summary-taxes">₹0</span></div>
                    <div class="summary-row total"><span>Total</span><span id="summary-total">₹0</span></div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 IBD Teal Jewelry. All rights reserved.</p>
    </footer>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/checkout.js"></script>
</body>
</html>
