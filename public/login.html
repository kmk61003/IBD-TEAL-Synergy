<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register - IBD Teal Jewelry</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">IBD Teal Jewelry</a>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/shop.html">Shop</a>
                <a href="/my-account.html">My Account</a>
                <a href="/cart.html" class="cart-link">Cart (<span id="cart-count">0</span>)</a>
                <div id="auth-links">
                    <a href="/login.html">Login</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="auth-container">
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">Login</button>
                <button class="auth-tab" data-tab="register">Register</button>
            </div>

            <!-- Login Form -->
            <div id="login-tab" class="auth-form">
                <h2>Login</h2>
                <form id="login-form" novalidate>
                    <div class="form-group">
                        <label for="login-email">Email *</label>
                        <input type="email" id="login-email" required autocomplete="email" maxlength="100" placeholder="you@example.com" />
                        <span class="field-error"></span>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password *</label>
                        <input type="password" id="login-password" required autocomplete="current-password" minlength="6" maxlength="128" placeholder="Enter your password" />
                        <span class="field-error"></span>
                    </div>
                    <div id="login-error" class="error-message" style="display:none;"></div>
                    <button type="submit" class="btn btn-primary btn-block">Login</button>
                </form>
            </div>

            <!-- Register Form -->
            <div id="register-tab" class="auth-form" style="display:none;">
                <h2>Create Account</h2>
                <form id="register-form" novalidate>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="reg-fname">First Name *</label>
                            <input type="text" id="reg-fname" required autocomplete="given-name" maxlength="50" pattern="[A-Za-z ]{1,50}" title="Letters and spaces only" placeholder="John" />
                            <span class="field-error"></span>
                        </div>
                        <div class="form-group">
                            <label for="reg-lname">Last Name</label>
                            <input type="text" id="reg-lname" autocomplete="family-name" maxlength="50" pattern="[A-Za-z ]{0,50}" title="Letters and spaces only" placeholder="Doe" />
                            <span class="field-error"></span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="reg-email">Email *</label>
                        <input type="email" id="reg-email" required autocomplete="email" maxlength="100" placeholder="you@example.com" />
                        <span class="field-error"></span>
                    </div>
                    <div class="form-group">
                        <label for="reg-phone">Phone</label>
                        <input type="tel" id="reg-phone" autocomplete="tel" maxlength="15" pattern="[0-9+\-\s]{0,15}" title="Phone number (digits, +, -, spaces)" placeholder="+91 9876543210" />
                        <span class="field-error"></span>
                    </div>
                    <div class="form-group">
                        <label for="reg-password">Password * (min 6 characters)</label>
                        <input type="password" id="reg-password" minlength="6" maxlength="128" required autocomplete="new-password" placeholder="Min 6 characters" />
                        <span class="field-error"></span>
                    </div>
                    <div id="register-error" class="error-message" style="display:none;"></div>
                    <button type="submit" class="btn btn-primary btn-block">Create Account</button>
                </form>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 IBD Teal Jewelry. All rights reserved.</p>
    </footer>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        $(document).ready(function () {
            Auth.updateNav();

            // If already logged in, redirect
            if (Auth.getToken()) {
                window.location.href = '/';
                return;
            }

            // Live validation
            Validate.bindLiveValidation('#login-form');
            Validate.bindLiveValidation('#register-form');

            // Tab switching
            $('.auth-tab').click(function () {
                $('.auth-tab').removeClass('active');
                $(this).addClass('active');
                const tab = $(this).data('tab');
                if (tab === 'login') {
                    $('#login-tab').show();
                    $('#register-tab').hide();
                } else {
                    $('#login-tab').hide();
                    $('#register-tab').show();
                }
            });

            // Login
            $('#login-form').submit(function (e) {
                e.preventDefault();
                $('#login-error').hide();
                if (!Validate.validateForm('#login-form')) return;
                API.post('/api/auth/login', {
                    email: $('#login-email').val(),
                    password: $('#login-password').val()
                }).then(data => {
                    Auth.setToken(data.token, data.customer);
                    window.location.href = '/';
                }).catch(err => {
                    $('#login-error').text(err.responseJSON?.error || 'Login failed.').show();
                });
            });

            // Register
            $('#register-form').submit(function (e) {
                e.preventDefault();
                $('#register-error').hide();
                if (!Validate.validateForm('#register-form')) return;
                API.post('/api/auth/register', {
                    first_name: $('#reg-fname').val(),
                    last_name: $('#reg-lname').val(),
                    email: $('#reg-email').val(),
                    phone_no: $('#reg-phone').val(),
                    password: $('#reg-password').val()
                }).then(data => {
                    Auth.setToken(data.token, data.customer);
                    window.location.href = '/';
                }).catch(err => {
                    $('#register-error').text(err.responseJSON?.error || 'Registration failed.').show();
                });
            });
        });
    </script>
