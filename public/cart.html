<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - IBD Teal Jewelry</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">

<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">IBD Teal Jewelry</a>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/shop.html">Shop</a>
                <a href="/my-account.html">My Account</a>
                <a href="/cart.html" class="cart-link active">Cart (<span id="cart-count">0</span>)</a>
                <div id="auth-links">
                    <a href="/login.html">Login</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container">
        <h1>Shopping Cart</h1>

        <div id="cart-loading" class="loading">Loading cart...</div>

        <div id="cart-empty" class="empty-state" style="display:none;">
            <p>Your cart is empty.</p>
            <a href="/shop.html" class="btn btn-primary">Continue Shopping</a>
        </div>

        <div id="cart-content" style="display:none;">
            <table class="cart-table">
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Metal</th>
                        <th>Size</th>
                        <th>Price</th>
                        <th>Quantity</th>
                        <th>Total</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="cart-items"></tbody>
            </table>

            <div class="cart-summary">
                <div class="cart-total">
                    <span>Cart Total:</span>
                    <span id="cart-total-amount">₹0</span>
                </div>
                <div class="cart-actions">
                    <a href="/shop.html" class="btn">Continue Shopping</a>
                    <a href="/checkout.html" class="btn btn-primary">Proceed to Checkout</a>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 IBD Teal Jewelry. All rights reserved.</p>
    </footer>
